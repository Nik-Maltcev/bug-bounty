version: '3.8'

services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DATABASE_URL=sqlite:////data/bugbounty.db
    volumes:
      - bugbounty-data:/data
    networks:
      - bugbounty-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: bb-frontend
    ports:
      - "80:80"
    networks:
      - bugbounty-net
    restart: unless-stopped
    depends_on:
      - backend

networks:
  bugbounty-net:
    driver: bridge

volumes:
  bugbounty-data:
